<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Votol Dashboard Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="top-header">
        <div class="status-bar">
            <span id="conn-status" class="status-offline">● OFFLINE</span>
            <span id="clock">00:00</span>
        </div>
        <button id="connectBtn" onclick="toggleConnect()">CONNECT</button>
    </header>

    <main id="content">
        <section id="dash" class="page active">
            <div class="card main-speed">
                <div class="speed-circle">
                    <h2 id="speed">0</h2>
                    <p class="unit">KM/H</p>
                    <div class="rpm-display"><b id="rpm">0</b></div>
                </div>
                <div class="mode-badge" id="mode">PARKING</div>
            </div>

            <div class="info-grid-3">
                <div class="card mini"><i data-lucide="map-pin" class="icon-purple"></i><span class="label">RANGE</span><b id="range">0 <small>km</small></b></div>
                <div class="card mini"><i data-lucide="milestone" class="icon-green"></i><span class="label">TRIP</span><b id="trip">0.0 <small>km</small></b></div>
                <div class="card mini"><i data-lucide="battery" class="icon-cyan"></i><span class="label">SOC</span><b id="soc-main">0%</b></div>
            </div>

            <div class="card">
                <div class="temp-header"><i data-lucide="thermometer" class="icon-orange"></i><span class="label">Temperatures</span></div>
                <div class="temp-grid-3">
                    <div class="temp-item"><span class="sub-label">ECU</span><b id="t-ecu">0°</b></div>
                    <div class="temp-item"><span class="sub-label">MTR</span><b id="t-motor">0°</b></div>
                    <div class="temp-item"><span class="sub-label">BAT</span><b id="t-batt">0°</b></div>
                </div>
            </div>
        </section>

        <section id="battery" class="page">
            <div class="card">
                <div class="label">Battery Energy (SOC)</div>
                <div class="soc-bar-container"><div id="soc-fill" class="soc-fill"></div></div>
                <div class="battery-stats-4col">
                    <div><small>SOC</small><br><b id="soc-batt">0%</b></div>
                    <div><small>Volt</small><br><b id="volts">0.0V</b></div>
                    <div><small>Amp</small><br><b id="amps">0.0A</b></div>
                    <div><small>Watt</small><br><b id="watts">0W</b></div>
                </div>
            </div>
            <div id="cell-grid" class="cell-grid"></div>
        </section>

        <section id="trip-page" class="page">
            <div class="card">
                <div class="label">Current Trip Info</div>
                <div class="stats-3col-large">
                    <div><small>Distance</small><br><b id="trip-dist">0.0 km</b></div>
                    <div><small>Avg Wh/km</small><br><b id="avg-wh">0.0</b></div>
                    <div><small>Power Use</small><br><b id="power-use">0W</b></div>
                </div>
            </div>
        </section>

        <section id="logs" class="page">
            <div class="card console-card">
                <div class="label" style="color: var(--cyan);">CAN JSON Stream</div>
                <pre id="log-box">Waiting for data...</pre>
            </div>
        </section>

        <section id="settings" class="page">
            <div class="card">
                <div class="label">Splashscreen Setting</div>
                <div class="input-group">
                    <input type="text" id="splashInput" placeholder="Nama Splash (Max 10)" maxlength="10">
                    <button class="btn-cyan" onclick="sendSplash()">UPDATE</button>
                </div>
            </div>
            <div class="card">
                <div class="label">System Sync</div>
                <button class="btn-purple" onclick="syncTime()">SYNC DEVICE TIME</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('dash')"><i data-lucide="gauge"></i></div>
        <div class="nav-item" onclick="nav('battery')"><i data-lucide="battery-charging"></i></div>
        <div class="nav-item" onclick="nav('trip-page')"><i data-lucide="route"></i></div>
        <div class="nav-item" onclick="nav('logs')"><i data-lucide="scroll-text"></i></div>
        <div class="nav-item" onclick="nav('settings')"><i data-lucide="settings"></i></div>
    </nav>

    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
