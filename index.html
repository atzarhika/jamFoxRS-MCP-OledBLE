<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Votol Dash Pro v1.1</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="top-header">
        <div class="status-bar">
            <span id="conn-status">● OFFLINE</span> <span id="clock">00:00</span>
        </div>
        <button id="connectBtn" onclick="toggleConnect()">CONNECT</button>
    </header>

    <main id="main-content">
        <div id="page-container"></div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="loadPage('dash', this)"><i data-lucide="gauge"></i></div>
        <div class="nav-item" onclick="loadPage('battery', this)"><i data-lucide="battery-charging"></i></div>
        <div class="nav-item" onclick="loadPage('trip', this)"><i data-lucide="route"></i></div>
        <div class="nav-item" onclick="loadPage('logs', this)"><i data-lucide="scroll-text"></i></div>
        <div class="nav-item" onclick="loadPage('settings', this)"><i data-lucide="settings"></i></div>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
