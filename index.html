<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Votol Dash Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="top-header">
        <div class="status-bar">
            <span id="conn-status">● OFFLINE</span> <span id="clock">00:00</span>
        </div>
        <button id="connectBtn" onclick="toggleConnect()">CONNECT</button>
    </header>

    <main>
        <section id="dash" class="page active">
            <div class="main-speed">
                <div class="speed-circle" id="gauge-circle">
                    <div class="glow-ball" id="glow-ball"></div>
                    <h2 id="speed">0</h2>
                    <span class="label">KM/H</span>
                    <div class="rpm-display" id="rpm-val">0</div>
                </div>
                <div class="mode-badge" id="mode-text">PARKING</div>
            </div>

            <div class="info-grid-3">
                <div class="card mini"><i data-lucide="map-pin"></i><span class="label">RANGE</span><b>0 km</b></div>
                <div class="card mini"><i data-lucide="milestone"></i><span class="label">TRIP</span><b>0.0 km</b></div>
                <div class="card mini"><i data-lucide="battery"></i><span class="label">SOC</span><b id="soc-dash">0%</b></div>
                
                <div class="card full-width" style="grid-column: span 3;">
                    <div class="temp-grid-3">
                        <div class="temp-item"><span class="label">ECU</span><b id="t-ecu">0°</b></div>
                        <div class="temp-item"><span class="label">MTR</span><b id="t-motor">0°</b></div>
                        <div class="temp-item"><span class="label">BAT</span><b id="t-batt">0°</b></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="battery" class="page">
            <div class="card">
                <span class="label">BATTERY ENERGY (SOC)</span>
                <div class="soc-bar-container"><div id="soc-bar" class="soc-fill"></div></div>
                
                <div class="battery-stats-5col">
                    <div class="stat-item"><small>SOC</small><b id="soc-batt">0%</b></div>
                    <div class="stat-item"><small>BH</small><b id="soh-val">0%</b></div>
                    <div class="stat-item"><small>VOLT</small><b id="v-val">0.0V</b></div>
                    <div class="stat-item"><small>AMP</small><b id="a-val">0.0A</b></div>
                    <div class="stat-item"><small>WATT</small><b id="w-val">0W</b></div>
                </div>
            </div>
            <div id="cell-grid" class="cell-grid"></div>
        </section>

        <section id="trip-page" class="page"></section>
        <section id="logs" class="page"></section>
        <section id="settings" class="page"></section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('dash')"><i data-lucide="gauge"></i></div>
        <div class="nav-item" onclick="nav('battery')"><i data-lucide="battery-charging"></i></div>
        <div class="nav-item" onclick="nav('route')"><i data-lucide="route"></i></div>
        <div class="nav-item" onclick="nav('scroll-text')"><i data-lucide="scroll-text"></i></div>
        <div class="nav-item" onclick="nav('settings')"><i data-lucide="settings"></i></div>
    </nav>

    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
