<section id="trip" class="page-content">
    <div class="card">
        <span class="label">TRIP ANALYTICS</span>
        <div class="stats-row" style="margin-top: 15px;">
            <div class="stat-box"><small>Distance</small><b id="trip-dist-large">0.0 km</b></div>
            <div class="stat-box"><small>Avg Wh/km</small><b id="avg-wh">0.0</b></div>
            <div class="stat-box"><small>Est Range</small><b id="est-range-trip" style="color:var(--cyan)">0 km</b></div>
        </div>
    </div>

    <div class="card" style="overflow: hidden;">
        <span class="label">History (30s)</span>
        <div style="display: flex; justify-content: space-between; gap: 10px; height: 120px; margin-top: 15px; width: 100%;">
            <div style="flex: 1; position: relative; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 5px; min-width: 0;">
                <small style="position: absolute; top: 2px; left: 5px; font-size: 8px; color: var(--orange); font-weight: bold; z-index: 5;">SPEED</small>
                <canvas id="speedChart"></canvas>
            </div>
            <div style="flex: 1; position: relative; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 5px; min-width: 0;">
                <small style="position: absolute; top: 2px; left: 5px; font-size: 8px; color: var(--cyan); font-weight: bold; z-index: 5;">CURRENT</small>
                <canvas id="currentChart"></canvas>
            </div>
        </div>
    </div>
</section>
