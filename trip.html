<section id="trip" class="page-content">
    <div class="card">
        <span class="label">TRIP ANALYTICS</span>
        <div class="stats-row" style="margin-top: 15px;">
            <div class="stat-box"><small>Distance</small><b id="trip-dist-large">0.0 km</b></div>
            <div class="stat-box"><small>Avg Wh/km</small><b id="avg-wh">0.0</b></div>
            <div class="stat-box"><small>Est Range</small><b id="est-range-trip" style="color:var(--cyan)">0 km</b></div>
        </div>
    </div>

    <div class="card history-card">
        <span class="label">History (30s)</span>
        <div class="chart-row">
            <div class="chart-wrapper">
                <small class="chart-tag" style="color: var(--orange);">SPEED</small>
                <canvas id="speedChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <small class="chart-tag" style="color: var(--cyan);">CURRENT</small>
                <canvas id="currentChart"></canvas>
            </div>
        </div>
    </div>
</section>
