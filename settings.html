<section id="settings" class="page-content">
    
    <!-- 1. SPLASHSCREEN SETTING -->
    <div class="card">
        <span class="label">SPLASHSCREEN SETTING</span>
        <input type="text" id="splashInput" placeholder="Nama Baru (Max 10)" maxlength="10" style="width: 100%; padding: 12px; margin-top: 10px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 8px; box-sizing: border-box;">
        <button onclick="sendSplash()" style="width: 100%; background: var(--cyan); border: none; padding: 12px; border-radius: 8px; font-weight: bold; color: white; margin-top: 10px; cursor: pointer;">UPDATE NAMA SPLASH</button>
    </div>

    <!-- 2. TIME SYNCHRONIZATION -->
    <div class="card">
        <span class="label">TIME SYNCHRONIZATION</span>
        <button onclick="syncTime()" style="width: 100%; background: var(--purple); border: none; padding: 12px; border-radius: 8px; font-weight: bold; color: white; margin-top: 10px; cursor: pointer;">SYNC JAM HP KE MOTOR</button>
    </div>

    <!-- 3. SPEED WARNING SETTING -->
    <div class="card">
        <span class="label">SPEED WARNING SETTING</span>
        <div style="margin-top:15px; display:flex; flex-direction:column; gap:15px;">
            
            <!-- OLED WARNING -->
            <div style="display:flex; justify-content:space-between; align-items:center; background:#0d1117; padding:12px; border-radius:8px; border:1px solid #30363d;">
                <label style="font-size:14px; font-weight:bold; color:white; cursor:pointer;">
                    <input type="checkbox" id="oledAlarmEn" checked>
                    OLED WARNING
                </label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="oledAlarmLimit" value="70" style="width:70px; text-align:center; background:#161b22; color:white; border:1px solid #30363d; border-radius:6px;">
                    <button onclick="sendAlarmOled()" style="background:var(--cyan); border:none; padding:8px 12px; border-radius:6px; color:white; font-weight:bold; cursor:pointer;">SET</button>
                </div>
            </div>

            <!-- BUZZER WARNING -->
            <div style="display:flex; justify-content:space-between; align-items:center; background:#0d1117; padding:12px; border-radius:8px; border:1px solid #30363d;">
                <label style="font-size:14px; font-weight:bold; color:white; cursor:pointer;">
                    <input type="checkbox" id="buzzAlarmEn" checked>
                    BUZZER WARNING
                </label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="buzzAlarmLimit" value="80" style="width:70px; text-align:center; background:#161b22; color:white; border:1px solid #30363d; border-radius:6px;">
                    <button onclick="sendAlarmBuzzer()" style="background:var(--orange); border:none; padding:8px 12px; border-radius:6px; color:white; font-weight:bold; cursor:pointer;">SET</button>
                </div>
            </div>

        </div>
    </div>

    <!-- 4. DEVICE PREFERENCES (POPUP & SLEEP) -->
    <div class="card">
        <span class="label">DEVICE PREFERENCES</span>
        <div style="margin-top:15px; display:flex; flex-direction:column; gap:15px;">
            <div style="display:flex; align-items:center; background:#0d1117; padding:12px; border-radius:8px; border:1px solid #30363d;">
                <label style="font-size:14px; font-weight:bold; color:white; display:flex; align-items:center; gap:10px; width:100%; cursor:pointer;">
                    <input type="checkbox" id="modePopupEn" checked onchange="sendModeToggle()"> 
                    Mode Popup (Termasuk Rem)
                </label>
            </div>
            <div style="display:flex; align-items:center; background:#0d1117; padding:12px; border-radius:8px; border:1px solid #30363d;">
                <label style="font-size:14px; font-weight:bold; color:white; display:flex; align-items:center; gap:10px; width:100%; cursor:pointer;">
                    <input type="checkbox" id="autoSleepEn" checked onchange="sendSleepToggle()"> 
                    Auto-Sleep (Kembali ke Jam)
                </label>
            </div>
        </div>
    </div>

    <!-- 5. KALIBRASI TRIP -->
    <div class="card">
        <span class="label">KALIBRASI BAN / VELG (AKURASI TRIP)</span>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <div style="flex:1;">
                <span style="font-size:11px; color:var(--text-dim);">Jarak Asli (Misal Maps):</span>
                <input type="number" step="0.1" id="realTrip" placeholder="Contoh: 83.8" style="width: 100%; padding:10px; margin-top:5px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="flex:1;">
                <span style="font-size:11px; color:var(--text-dim);">Jarak Tertera (Modul):</span>
                <input type="number" step="0.1" id="dashTrip" placeholder="Contoh: 89.8" style="width: 100%; padding:10px; margin-top:5px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 8px; box-sizing: border-box;">
            </div>
        </div>
        <button onclick="sendTripCalibration()" style="width: 100%; background: var(--orange); border: none; padding: 12px; border-radius: 8px; font-weight: bold; color: white; margin-top: 15px; cursor: pointer; transition: 0.2s;">HITUNG & SINKRONKAN KALIBRASI</button>
    </div>

</section>
